name: Lab Session

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Lab session ID'
        required: true
      callback_url:
        description: 'Callback URL for the Enter Bash API'
        required: true
      callback_token:
        description: 'Authentication token for callbacks'
        required: true
      timeout_minutes:
        description: 'Session timeout in minutes'
        required: true
        default: '55'
      challenge_name:
        description: 'Challenge to apply'
        required: true
      privileged:
        description: 'Run container in privileged mode (for kernel ops)'
        required: false
        default: 'false'

jobs:
  lab:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl wget

          # Install ttyd via snap (more reliable than binary download)
          sudo snap install ttyd --classic || {
            # Fallback: build-essential approach
            sudo apt-get install -y -qq cmake g++ pkg-config git libjson-c-dev libwebsockets-dev
            git clone --depth=1 https://github.com/tsl0922/ttyd.git /tmp/ttyd-build
            cd /tmp/ttyd-build && mkdir build && cd build
            cmake .. && make && sudo make install
          }

          # Install cloudflared
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Start lab environment
        env:
          SESSION_ID: ${{ inputs.session_id }}
          CALLBACK_URL: ${{ inputs.callback_url }}
          CALLBACK_TOKEN: ${{ inputs.callback_token }}
          TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
          CHALLENGE_NAME: ${{ inputs.challenge_name }}
          PRIVILEGED: ${{ inputs.privileged }}
        run: |
          chmod +x scripts/run-lab.sh
          bash scripts/run-lab.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: lab-${{ inputs.session_id }}
          path: /tmp/lab-artifacts/
          retention-days: 7
          if-no-files-found: ignore
