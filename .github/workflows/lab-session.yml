name: Run

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Session ID'
        required: true
      callback_url:
        description: 'Callback URL'
        required: true
      callback_token:
        description: 'Auth token'
        required: true
      timeout_minutes:
        description: 'Timeout'
        required: true
        default: '55'
      challenge_name:
        description: 'Task'
        required: true
      privileged:
        description: 'Privileged'
        required: false
        default: 'false'
      web_port:
        description: 'Web service port for browser tab (0=disabled)'
        required: false
        default: '0'

jobs:
  lab:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl wget socat

          # Install ttyd via snap (more reliable than binary download)
          sudo snap install ttyd --classic || {
            # Fallback: build-essential approach
            sudo apt-get install -y -qq cmake g++ pkg-config git libjson-c-dev libwebsockets-dev
            git clone --depth=1 https://github.com/tsl0922/ttyd.git /tmp/ttyd-build
            cd /tmp/ttyd-build && mkdir build && cd build
            cmake .. && make && sudo make install
          }

          # Install cloudflared
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

          # Install Caddy (for browser tab reverse proxy)
          wget -q https://github.com/caddyserver/caddy/releases/download/v2.8.4/caddy_2.8.4_linux_amd64.tar.gz -O /tmp/caddy.tar.gz
          tar xzf /tmp/caddy.tar.gz -C /usr/local/bin caddy
          chmod +x /usr/local/bin/caddy

      - name: Start lab environment
        env:
          SESSION_ID: ${{ inputs.session_id }}
          CALLBACK_URL: ${{ inputs.callback_url }}
          CALLBACK_TOKEN: ${{ inputs.callback_token }}
          TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
          CHALLENGE_NAME: ${{ inputs.challenge_name }}
          PRIVILEGED: ${{ inputs.privileged }}
          WEB_PORT: ${{ inputs.web_port }}
          CONTENT_BASE: ${{ secrets.CONTENT_BASE }}
          LAB_IMAGE: ${{ secrets.LAB_IMAGE }}
        run: |
          chmod +x scripts/run-lab.sh
          bash scripts/run-lab.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: lab-${{ inputs.session_id }}
          path: /tmp/lab-artifacts/
          retention-days: 7
          if-no-files-found: ignore
